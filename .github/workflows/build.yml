name: Build and Release

on:
  workflow_dispatch:
    inputs:
      yandex_ads_version:
        description: 'YandexMobileAds version to build'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Update podspec version
        run: |
          sed -i '' "s/s.version.*=.*/s.version      = '${{ inputs.yandex_ads_version }}'/" YandexMobileAdsBinary.podspec

      - name: Build frameworks
        run: ./build_frameworks.sh "${{ inputs.yandex_ads_version }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update YandexMobileAds to ${{ inputs.yandex_ads_version }}"
          git tag "${{ inputs.yandex_ads_version }}"
          git push origin main --tags
