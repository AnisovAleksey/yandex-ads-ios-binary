name: Build and Release

on:
  workflow_dispatch:
    inputs:
      yandex_ads_version:
        description: 'YandexMobileAds version to build (leave empty for latest)'
        required: false
        type: string

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Git LFS
        run: git lfs install

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Build frameworks
        run: |
          if [ -n "${{ inputs.yandex_ads_version }}" ]; then
            ./build_frameworks.sh "${{ inputs.yandex_ads_version }}"
          else
            ./build_frameworks.sh
          fi

      - name: Get resolved version
        id: version
        run: |
          VERSION=$(grep "s.version" YandexMobileAdsBinary.podspec | head -1 | sed "s/.*'\(.*\)'/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update YandexMobileAds to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push origin main --tags
